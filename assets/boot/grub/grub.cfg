
# ++++++++++++++++++++++++++++++++++++++++++++++
# Kouprey Boot - Custom GRUB configuration
# ++++++++++++++++++++++++++++++++++++++++++++++

# Dynamically find GRUB prefix by searching for normal.mod
search --no-floppy --set=prefix_root --file /grub/$grub_cpu-$grub_platform/normal.mod
if [ -n "$prefix_root" ]; then
    set prefix=($prefix_root)/grub
fi

# Fallback: try ESP partition directly if search failed
if [ -z "$prefix" ]; then
    if [ -f (hd0,gpt2)/grub/$grub_cpu-$grub_platform/normal.mod ]; then
        set prefix=(hd0,gpt2)/grub
    elif [ -f (hd1,gpt2)/grub/$grub_cpu-$grub_platform/normal.mod ]; then
        set prefix=(hd1,gpt2)/grub
    elif [ -f (hd2,gpt2)/grub/$grub_cpu-$grub_platform/normal.mod ]; then
        set prefix=(hd2,gpt2)/grub
    elif [ -f (hd3,gpt2)/grub/$grub_cpu-$grub_platform/normal.mod ]; then
        set prefix=(hd3,gpt2)/grub
    fi
fi

if [ -z "$prefix" ]; then
    echo "ERROR: GRUB prefix not found! Loading minimal config."
    set prefix=($root)/grub
fi

# Video mode
insmod efi_gop
insmod efi_uga
insmod video_bochs
insmod video_cirrus
insmod all_video
insmod gfxterm
insmod gfxmenu
insmod jpeg
insmod png

# Filesystem modules
insmod part_gpt
insmod part_msdos
insmod exfat
insmod ntfs
insmod fat
insmod ext2
insmod iso9660
insmod udf
insmod loopback
insmod chain
insmod search
insmod search_fs_file
insmod search_fs_uuid
insmod search_label
insmod probe
insmod regexp
insmod cat
insmod ls
insmod echo
insmod gzio
insmod xzio
insmod efifwsetup
insmod hfsplus
insmod hfs
insmod squash4
insmod lvm
insmod mdraid09
insmod mdraid1x
insmod diskfilter
insmod linux

set gfxmode=auto
set gfxpayload=keep
terminal_output gfxterm

# Font search with multiple fallbacks
if [ -f $prefix/fonts/unicode.pf2 ]; then
    loadfont $prefix/fonts/unicode.pf2
elif [ -f $prefix/fonts/ascii.pf2 ]; then
    loadfont $prefix/fonts/ascii.pf2
elif [ -f $prefix/fonts/dejavu_sans_mono_16.pf2 ]; then
    loadfont $prefix/fonts/dejavu_sans_mono_16.pf2
elif [ -f $prefix/fonts/DroidSansFallback/unicode.pf2 ]; then
    loadfont $prefix/fonts/DroidSansFallback/unicode.pf2
fi

# Find DATA partition — scan ALL devices for KOUPREYDATA label or marker files
search --no-floppy --set=data_root --label KOUPREYDATA
if [ -z "$data_root" ]; then
    search --no-floppy --set=data_root --file /themes/.marker
fi
if [ -z "$data_root" ]; then
    search --no-floppy --set=data_root --file /ISOS/DUMMY
fi
if [ -z "$data_root" ]; then
    search --no-floppy --set=data_root --file /ISOS/.iso_menu.cfg
fi
if [ -n "$data_root" ]; then
    if [ -f ($data_root)/themes/theme.txt ]; then
        set theme=($data_root)/themes/theme.txt
    fi
else
    if [ -f $prefix/themes/theme.txt ]; then
        set theme=$prefix/themes/theme.txt
    fi
fi

# Default timeout
if [ -z "$timeout" ]; then
    set timeout=30
fi

# Color
set menu_color_normal=cyan/blue
set menu_color_highlight=white/blue

# Main menu header
menuentry "Kouprey Boot - USB Multi-Boot" --class kouprey {
    echo "Kouprey Boot loaded successfully"
}

# boot_iso function — $1 = GRUB device, $2 = ISO path (e.g. /ISOS/file.iso)
function boot_iso {
    set iso_dev=$1
    set iso_path=$2
    set iso_full="${iso_dev}${iso_path}"

    if [ -z "$iso_dev" -o -z "$iso_path" ]; then
        echo "Error: boot_iso called with empty device or path."
        sleep 3
        return
    fi

    loopback -d loop
    echo "Mounting: ${iso_full}"
    loopback loop "${iso_full}"

    # Strategy 1: Load ISO's own GRUB loopback.cfg (modern distros)
    if [ -f (loop)/boot/grub/loopback.cfg ]; then
        echo "Found: boot/grub/loopback.cfg"
        configfile (loop)/boot/grub/loopback.cfg
        return
    fi
    if [ -f (loop)/boot/grub2/loopback.cfg ]; then
        echo "Found: boot/grub2/loopback.cfg"
        configfile (loop)/boot/grub2/loopback.cfg
        return
    fi

    # Strategy 2: Load ISO's own grub.cfg
    if [ -f (loop)/boot/grub/grub.cfg ]; then
        echo "Found: boot/grub/grub.cfg"
        configfile (loop)/boot/grub/grub.cfg
        return
    fi
    if [ -f (loop)/grub/grub.cfg ]; then
        echo "Found: grub/grub.cfg"
        configfile (loop)/grub/grub.cfg
        return
    fi
    if [ -f (loop)/EFI/BOOT/grub.cfg ]; then
        echo "Found: EFI/BOOT/grub.cfg"
        configfile (loop)/EFI/BOOT/grub.cfg
        return
    fi
    if [ -f (loop)/boot/grub/grub.cfg ]; then
        echo "Found: boot/grub/grub.cfg (alt)"
        configfile (loop)/boot/grub/grub.cfg
        return
    fi

    # Strategy 3: UEFI chainloading
    if [ "$grub_platform" = "efi" ]; then
        if [ -f (loop)/efi/boot/bootx64.efi ]; then
            echo "Chainloading: efi/boot/bootx64.efi"
            if chainloader (loop)/efi/boot/bootx64.efi; then boot; fi
        fi
        if [ -f (loop)/EFI/BOOT/BOOTX64.EFI ]; then
            echo "Chainloading: EFI/BOOT/BOOTX64.EFI"
            if chainloader (loop)/EFI/BOOT/BOOTX64.EFI; then boot; fi
        fi
        if [ -f (loop)/efi/microsoft/boot/bootmgfw.efi ]; then
            echo "Chainloading: efi/microsoft/boot/bootmgfw.efi"
            if chainloader (loop)/efi/microsoft/boot/bootmgfw.efi; then boot; fi
        fi
        if [ -f (loop)/efi/boot/bootia32.efi ]; then
            echo "Chainloading: efi/boot/bootia32.efi"
            if chainloader (loop)/efi/boot/bootia32.efi; then boot; fi
        fi
        # Windows WIM-based ISO: chainload via bootmgfw.efi
        if [ -f (loop)/sources/boot.wim ]; then
            echo "Windows WIM ISO detected - chainloading bootx64.efi"
            if [ -f (loop)/efi/microsoft/boot/bootmgfw.efi ]; then
                if chainloader (loop)/efi/microsoft/boot/bootmgfw.efi; then boot; fi
            fi
        fi
    fi

    # Strategy 4: Legacy BIOS chainloading
    # Note: ntldr command was removed in GRUB 2.12.
    # Use chainloader +1 on the partition for local Windows installs.
    if [ "$grub_platform" = "pc" ]; then
        echo "BIOS Windows ISO booting requires the ntldr module"
        echo "(not available in this GRUB build). Use UEFI mode instead."
    fi

    # Strategy 5: Try chainloading the ISO directly (UEFI only)
    if [ "$grub_platform" = "efi" ]; then
        echo "No GRUB config found inside ISO."
        echo "Trying direct device mapping..."
        echo "ISO may not support UEFI boot. Try Legacy BIOS mode."
    fi

    loopback -d loop
    echo "Cannot boot: ${iso_full}"
    echo "The ISO may be incompatible or corrupted."
    sleep 5
}

# Auto-generated ISO entries from ISOS/.iso_menu.cfg
if [ -n "$data_root" ]; then
    submenu "Browse ISOs -->" --class iso {
        if [ -f ($data_root)/ISOS/.iso_menu.cfg ]; then
            source ($data_root)/ISOS/.iso_menu.cfg
        else
            echo "----------------------------------------------"
            echo " No .iso_menu.cfg found in ($data_root)/ISOS/"
            echo " Run: flash_headless.py -gen-iso-menu -disk N"
            echo " Then reboot to see your ISO entries."
            echo "----------------------------------------------"
        fi
        menuentry '<-- Return to main menu [Esc]' --class vtoyret {
            echo 'Return to main menu...'
        }
    }
fi

# Utility entries
menuentry "--- System ---" --class separator {
    true
}
# Windows local boot entries
menuentry "Boot Local Windows" --class windows --class os {
    insmod chain
    insmod ntfs
    insmod fat
    insmod part_gpt
    insmod part_msdos
    insmod search
    if [ "$grub_platform" = "efi" ]; then
        if search --no-floppy --set=root --file /EFI/Microsoft/Boot/bootmgfw.efi; then
            echo "Found: /EFI/Microsoft/Boot/bootmgfw.efi"
            chainloader /EFI/Microsoft/Boot/bootmgfw.efi
            boot
        elif search --no-floppy --set=root --file /efi/microsoft/boot/bootmgfw.efi; then
            echo "Found: /efi/microsoft/boot/bootmgfw.efi"
            chainloader /efi/microsoft/boot/bootmgfw.efi
            boot
        elif search --no-floppy --set=root --file /Windows/Boot/EFI/bootmgfw.efi; then
            echo "Found: /Windows/Boot/EFI/bootmgfw.efi"
            chainloader /Windows/Boot/EFI/bootmgfw.efi
            boot
        else
            echo "Windows Boot Manager not found on any partition!"
            sleep 3
        fi
    else
        if search --no-floppy --set=root --file /bootmgr; then
            echo "Found: /bootmgr - chainloading partition bootsector"
            chainloader +1
            boot
        elif search --no-floppy --set=root --file /ntldr; then
            echo "Found: /ntldr - chainloading partition bootsector"
            chainloader +1
            boot
        else
            echo "Windows bootloader not found on any partition!"
            sleep 3
        fi
    fi
}

# Ventoy boot via ventoy.disk.img
menuentry "Ventoy (ISO menu via ventoy.disk.img)" --class ventoy {
    insmod loopback
    insmod chain
    insmod fat
    insmod part_gpt
    insmod search
    if [ -f $prefix/ventoy.disk.img ]; then
        set vtoy_img=$prefix/ventoy.disk.img
    else
        search --no-floppy --set=vtoy_dev --file /ventoy/ventoy.disk.img
        if [ -n "$vtoy_dev" ]; then
            set vtoy_img=($vtoy_dev)/ventoy/ventoy.disk.img
        fi
    fi
    if [ -n "$vtoy_img" ]; then
        echo Loading: $vtoy_img
        loopback vtoydev $vtoy_img
        if [ -f (vtoydev)/EFI/BOOT/BOOTX64.EFI ]; then
            chainloader (vtoydev)/EFI/BOOT/BOOTX64.EFI
            boot
        else
            loopback -d vtoydev
        fi
    fi
    echo ventoy.disk.img not found!
    sleep 3
}


menuentry "Boot from next device" --class fwboot {
    exit
}

menuentry "Reboot" --class reboot {
    reboot
}

menuentry "Shutdown" --class halt {
    halt
}
