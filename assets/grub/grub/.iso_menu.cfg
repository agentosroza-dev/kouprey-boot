# Kouprey Boot - Manual ISO menu entries
# Place this file on your DATA partition at: /ISOS/.iso_menu.cfg
# Overrides auto-generated entries when present.
# NOTE: All required GRUB modules are already loaded from the main grub.cfg

# ============================================================================
# Auto-generated entries (from ISOS/ directory)
# The boot_iso function handles: loopback.cfg -> grub.cfg -> chainload -> memdisk
# ============================================================================

menuentry "Boot WinPE11_10_Sergei_Strelec_x64_2025.05.22_English.iso" --class iso {
    boot_iso "($data_root)" "/ISOS/WinPE11_10_Sergei_Strelec_x64_2025.05.22_English.iso"
}

menuentry "Boot cachyos-desktop-linux-260426.iso" --class iso {
    boot_iso "($data_root)" "/ISOS/cachyos-desktop-linux-260426.iso"
}

menuentry "Boot redorescue-4.0.0.iso" --class iso {
    boot_iso "($data_root)" "/ISOS/redorescue-4.0.0.iso"
}

menuentry "Boot windows-10-22h2-build-19041.iso" --class iso {
    boot_iso "($data_root)" "/ISOS/windows-10-22h2-build-19041.iso"
}


# ============================================================================
# Manual entries — for ISOs that need non-generic boot params
# Update device/partition paths before use
# ============================================================================

# ---------------------------------------------------------------------------
# Windows 11 ISO (chainload from loopback)
# Update: (hd0,msdos1) -> your drive/partition containing the ISO
# ---------------------------------------------------------------------------
menuentry "Boot Windows 11 ISO" --class windows {
    insmod fat
    insmod ntfs
    insmod loopback
    insmod chain
    set isofile="/ISOS/windows-11-24h2.iso"
    loopback loop (hd0,msdos1)$isofile
    chainloader (loop)/efi/boot/bootx64.efi
    boot
}

# ---------------------------------------------------------------------------
# Windows 10/11 Setup (extracted files on ESP)
# Requires: Windows ISO contents extracted to ESP's EFI partition
# Update: (hd0,gpt1) -> your EFI system partition
# ---------------------------------------------------------------------------
menuentry "Windows 10 Setup (UEFI)" --class windows {
    insmod part_gpt
    insmod fat
    insmod chain
    set root=(hd0,gpt1)
    chainloader /EFI/Microsoft/Boot/bootmgfw.efi
}

# ---------------------------------------------------------------------------
# Debian / Ubuntu Server ISO (loopback + install.amd)
# Update: (hd0,msdos1) -> drive/partition with the ISO
# ---------------------------------------------------------------------------
menuentry "Debian ISO Boot" --class debian {
    insmod part_msdos
    insmod ext2
    insmod loopback
    insmod iso9660
    set root=(hd0,msdos1)
    set isofile="/ISOS/debian-12.9.0-amd64-netinst.iso"
    loopback loop ($root)$isofile
    linux (loop)/install.amd/vmlinuz findiso=$isofile
    initrd (loop)/install.amd/initrd.gz
    boot
}

# ---------------------------------------------------------------------------
# Ubuntu Live / Desktop ISO (loopback + casper)
# Update: (hd0,gpt1) -> drive/partition with the ISO
# ---------------------------------------------------------------------------
menuentry "Ubuntu Live ISO" --class ubuntu {
    insmod loopback
    insmod iso9660
    set root=(hd0,gpt1)
    set isofile="/ISOS/ubuntu-26.04-desktop-amd64.iso"
    loopback loop (hd0,gpt1)$isofile
    linux (loop)/casper/vmlinuz boot=casper iso-scan/filename=$isofile quiet splash --
    initrd (loop)/casper/initrd.img
}

# ---------------------------------------------------------------------------
# Arch Linux ISO (loopback)
# Update: hd0,gpt1 -> drive/partition
#         img_dev -> correct device node (e.g. /dev/sda1 or /dev/nvme0n1p1)
# ---------------------------------------------------------------------------
menuentry "Arch Linux ISO" --class arch {
    insmod loopback
    insmod iso9660
    set root=(hd0,gpt1)
    set isofile="/ISOS/archlinux-2026.06.01-x86_64.iso"
    loopback loop (hd0,gpt1)$isofile
    linux (loop)/arch/boot/x86_64/vmlinuz-linux img_loop=$isofile img_dev=/dev/sda1 archisobasedir=arch archisolabel=ARCH_202606
    initrd (loop)/arch/boot/x86_64/archiso.img
}

# ---------------------------------------------------------------------------
# Windows 11 Setup (extracted files via UUID search)
# Update: XXXX-XXXX -> real partition UUID
# ---------------------------------------------------------------------------
menuentry 'Windows 11 Setup' --class windows {
    search --no-floppy --fs-uuid --set=root XXXX-XXXX
    chainloader /efi/boot/bootx64.efi
}

# ---------------------------------------------------------------------------
# Windows 10/11 UEFI (from NTFS partition with Windows)
# Update: (hd0,X) -> correct drive and partition number
# ---------------------------------------------------------------------------
menuentry "Windows 10 UEFI" --class windows {
    set root=(hd0,2)
    chainloader /EFI/Microsoft/Boot/bootmgfw.efi
    boot
}

# ---------------------------------------------------------------------------
# Redo Rescue (loopback)
# Update: hd0,gpt1 -> drive/partition
# ---------------------------------------------------------------------------
menuentry "Redo Rescue" --class redo {
    insmod loopback
    insmod iso9660
    set root=(hd0,gpt1)
    set isofile="/ISOS/redorescue.iso"
    loopback loop (hd0,gpt1)$isofile
    linux (loop)/live/vmlinuz boot=live findiso=$isofile components splash toram=filesystem.squashfs
    initrd (loop)/live/initrd.img
}

# ---------------------------------------------------------------------------
# Fedora Workstation ISO (loopback + search + probe)
# ---------------------------------------------------------------------------
menuentry "Boot Fedora ISO" --class fedora {
    insmod loopback
    insmod iso9660
    set isofile="/ISOS/Fedora-Workstation-Live-x86_64-41-1.4.iso"
    search --no-floppy -f --set=root $isofile
    loopback loop $isofile
    probe --set isolabel --label (loop)
    linux (loop)/images/pxeboot/vmlinuz root=live:CDLABEL=${isolabel} rd.live.image iso-scan/filename=${isofile} quiet rhgb
    initrd (loop)/images/pxeboot/initrd.img
}

# ---------------------------------------------------------------------------
# CachyOS ISO (Arch-based, loopback + search)
# Update: YOUR_PARTITION_UUID -> real UUID
# ---------------------------------------------------------------------------
menuentry "Boot CachyOS ISO" --class arch {
    insmod loopback
    insmod iso9660
    set isofile="/ISOS/cachyos.iso"
    search --no-floppy --file --set=root $isofile
    loopback loop $isofile
    linux (loop)/arch/boot/x86_64/vmlinuz-linux-cachyos img_loop=$isofile img_dev=/dev/disk/by-uuid/YOUR_PARTITION_UUID copytoram=auto
    initrd (loop)/arch/boot/x86_64/initramfs-linux-cachyos.img
}

# ---------------------------------------------------------------------------
# Generic WinPE (UEFI chainload from ESP)
# ---------------------------------------------------------------------------
menuentry "Boot WinPE (UEFI)" --class windows {
    chainloader /EFI/Boot/bootx64.efi
}
