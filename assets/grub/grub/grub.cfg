
# ++++++++++++++++++++++++++++++++++++++++++++++
# Kouprey Boot - Custom GRUB configuration
# ++++++++++++++++++++++++++++++++++++++++++++++

# Fix GRUB prefix — scan partitions for GRUB normal.mod on the ESP
if [ -f (hd0,gpt2)/grub/$grub_cpu-$grub_platform/normal.mod ]; then
    set prefix=(hd0,gpt2)/grub
elif [ -f (hd0,gpt1)/grub/$grub_cpu-$grub_platform/normal.mod ]; then
    set prefix=(hd0,gpt1)/grub
elif [ -f (hd0,gpt3)/grub/$grub_cpu-$grub_platform/normal.mod ]; then
    set prefix=(hd0,gpt3)/grub
elif [ -f (hd1,gpt2)/grub/$grub_cpu-$grub_platform/normal.mod ]; then
    set prefix=(hd1,gpt2)/grub
elif [ -f (hd1,gpt1)/grub/$grub_cpu-$grub_platform/normal.mod ]; then
    set prefix=(hd1,gpt1)/grub
elif [ -f (hd1,gpt3)/grub/$grub_cpu-$grub_platform/normal.mod ]; then
    set prefix=(hd1,gpt3)/grub
elif [ -f (hd2,gpt2)/grub/$grub_cpu-$grub_platform/normal.mod ]; then
    set prefix=(hd2,gpt2)/grub
elif [ -f (hd2,gpt1)/grub/$grub_cpu-$grub_platform/normal.mod ]; then
    set prefix=(hd2,gpt1)/grub
elif [ -f (hd2,gpt3)/grub/$grub_cpu-$grub_platform/normal.mod ]; then
    set prefix=(hd2,gpt3)/grub
elif [ -f (hd3,gpt2)/grub/$grub_cpu-$grub_platform/normal.mod ]; then
    set prefix=(hd3,gpt2)/grub
elif [ -f (hd3,gpt1)/grub/$grub_cpu-$grub_platform/normal.mod ]; then
    set prefix=(hd3,gpt1)/grub
elif [ -f (hd3,gpt3)/grub/$grub_cpu-$grub_platform/normal.mod ]; then
    set prefix=(hd3,gpt3)/grub
fi

# Video mode
insmod efi_gop
insmod efi_uga
insmod video_bochs
insmod video_cirrus
insmod all_video
insmod gfxterm
insmod gfxmenu
insmod jpeg
insmod png

# Filesystem modules
insmod part_gpt
insmod part_msdos
insmod exfat
insmod ntfs
insmod fat
insmod ext2
insmod iso9660
insmod udf
insmod loopback
insmod chain
insmod search
insmod search_fs_file
insmod search_label
insmod regexp
insmod cat
insmod ls
insmod echo
insmod gzio
insmod xzio
insmod efifwsetup

set gfxmode=auto
set gfxpayload=keep
terminal_output gfxterm

# Font
if [ -f $prefix/fonts/unicode.pf2 ]; then
    loadfont $prefix/fonts/unicode.pf2
elif [ -f $prefix/fonts/ascii.pf2 ]; then
    loadfont $prefix/fonts/ascii.pf2
fi

# Find DATA partition — scan ALL devices for themes/.marker
search --no-floppy --set=data_root --file /themes/.marker
if [ -n "$data_root" ]; then
    # Theme from DATA
    if [ -f ($data_root)/themes/theme.txt ]; then
        set theme=($data_root)/themes/theme.txt
    elif [ -f ($data_root)/themes/Vimix/theme.txt ]; then
        set theme=($data_root)/themes/Vimix/theme.txt
    fi
else
    # Fallback: try ESP
    if [ -f $prefix/themes/theme.txt ]; then
        set theme=$prefix/themes/theme.txt
    fi
fi

# Default timeout
if [ -z "$timeout" ]; then
    set timeout=30
fi

# Color
set menu_color_normal=cyan/blue
set menu_color_highlight=white/blue


# Main menu
menuentry "Kouprey Boot - USB Multi-Boot" --class kouprey {
    echo "Kouprey Boot loaded successfully"
}


# boot_iso function — $1 = GRUB device, $2 = ISO path (e.g. /ISOS/file.iso)
# Reads *.cfg files from inside the ISO, falls back to EFI chainload
function boot_iso {
    set iso_dev=$1
    set iso_path=$2
    set iso_full="${iso_dev}${iso_path}"

    loopback -d loop
    echo "Mounting: ${iso_full}"
    loopback loop "${iso_full}"

    # 1. loopback.cfg — most standard, used by most modern distros
    #    If it has "linux + initrd + boot" outside menuentry → boots immediately.
    #    If it has menuentry blocks → adds entries, then we fall through to EFI chainload.
    if [ -f (loop)/boot/grub/loopback.cfg ]; then
        echo "Found: boot/grub/loopback.cfg"
        configfile (loop)/boot/grub/loopback.cfg
    fi

    # 2. Other GRUB configs inside ISO
    if [ -f (loop)/boot/grub/grub.cfg ]; then
        echo "Found: boot/grub/grub.cfg"
        configfile (loop)/boot/grub/grub.cfg
    elif [ -f (loop)/grub/grub.cfg ]; then
        echo "Found: grub/grub.cfg"
        configfile (loop)/grub/grub.cfg
    elif [ -f (loop)/EFI/BOOT/grub.cfg ]; then
        echo "Found: EFI/BOOT/grub.cfg"
        configfile (loop)/EFI/BOOT/grub.cfg
    fi

    # 3. UEFI: chainload ISO's own EFI bootloader (seamless boot)
    if [ "$grub_platform" = "efi" ]; then
        if [ -f (loop)/efi/boot/bootx64.efi ]; then
            echo "Chainloading: efi/boot/bootx64.efi"
            chainloader (loop)/efi/boot/bootx64.efi
            boot
        fi
        if [ -f (loop)/EFI/BOOT/BOOTX64.EFI ]; then
            echo "Chainloading: EFI/BOOT/BOOTX64.EFI"
            chainloader (loop)/EFI/BOOT/BOOTX64.EFI
            boot
        fi
        if [ -f (loop)/efi/microsoft/boot/bootmgfw.efi ]; then
            echo "Chainloading: efi/microsoft/boot/bootmgfw.efi"
            chainloader (loop)/efi/microsoft/boot/bootmgfw.efi
            boot
        fi
    fi

    # 4. Legacy BIOS: memdisk fallback
    if [ "$grub_platform" = "pc" ]; then
        echo "Trying memdisk..."
        linux16 $prefix/../ventoy/memdisk iso raw
        initrd16 "${iso_full}"
        boot
    fi

    loopback -d loop
    echo "Cannot boot: ${iso_full}"
}

# Auto-generated ISO entries from ISOS/.iso_menu.cfg
if [ -n "$data_root" ]; then
    if [ -f ($data_root)/ISOS/.iso_menu.cfg ]; then
        source ($data_root)/ISOS/.iso_menu.cfg
    else
        echo "----------------------------------------------"
        echo " No .iso_menu.cfg found in ($data_root)/ISOS/"
        echo " Run: flash_headless.py -gen-iso-menu -disk N"
        echo " Then reboot to see your ISO entries."
        echo "----------------------------------------------"
    fi
fi

# Utility entries
menuentry "--- System ---" --class separator {
    true
}

menuentry "Boot from next device" --class fwboot {
    exit
}

menuentry "Reboot" --class reboot {
    reboot
}

menuentry "Shutdown" --class halt {
    halt
}
