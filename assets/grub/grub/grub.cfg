#
# Kouprey Boot - Custom GRUB configuration
#

# Video mode
insmod efi_gop
insmod efi_uga
insmod video_bochs
insmod video_cirrus
insmod all_video
insmod gfxterm
insmod gfxmenu
insmod jpeg
insmod png

# Filesystem modules
insmod part_gpt
insmod part_msdos
insmod exfat
insmod ntfs
insmod fat
insmod ext2
insmod iso9660
insmod udf
insmod loopback
insmod chain
insmod search
insmod search_fs_file
insmod search_label
insmod regexp
insmod cat
insmod ls
insmod echo

set gfxmode=auto
set gfxpayload=keep
terminal_output gfxterm

# Font
if [ -f $prefix/fonts/unicode.pf2 ]; then
    loadfont $prefix/fonts/unicode.pf2
elif [ -f $prefix/fonts/ascii.pf2 ]; then
    loadfont $prefix/fonts/ascii.pf2
fi

# Search for DATA partition using themes/.marker
search --no-floppy --set=data_root --file /themes/.marker
if [ -n "$data_root" ]; then
    # Theme from DATA
    if [ -f ($data_root)/themes/theme.txt ]; then
        set theme=($data_root)/themes/theme.txt
    elif [ -f ($data_root)/themes/Vimix/theme.txt ]; then
        set theme=($data_root)/themes/Vimix/theme.txt
    fi
else
    # Fallback: try ESP
    if [ -f $prefix/themes/ventoy/theme.txt ]; then
        set theme=$prefix/themes/ventoy/theme.txt
    fi
fi

# Default timeout
if [ -z "$timeout" ]; then
    set timeout=30
fi

# Color
set menu_color_normal=cyan/blue
set menu_color_highlight=white/blue

# Function to boot an ISO
function boot_iso {
    set iso_path=$1
    loopback loop $iso_path
    if [ -f (loop)/boot/grub/loopback.cfg ]; then
        configfile (loop)/boot/grub/loopback.cfg
    elif [ -f (loop)/boot/grub/grub.cfg ]; then
        configfile (loop)/boot/grub/grub.cfg
    elif [ -f (loop)/isolinux/isolinux.cfg ]; then
        loopback -d loop
        chainloader +1
    elif [ -f (loop)/boot/vmlinuz ]; then
        linux (loop)/boot/vmlinuz
        if [ -f (loop)/boot/initrd.img ]; then
            initrd (loop)/boot/initrd.img
        fi
    else
        loopback -d loop
        chainloader +1
    fi
}

# Main menu
menuentry "Kouprey Boot - USB Multi-Boot" --class kouprey {
    echo "Kouprey Boot loaded successfully"
}

# ISO listing
if [ -n "$data_root" ]; then
    set isopath=($data_root)/ISOS
    if [ -d "$isopath" ]; then
        menuentry "--- Bootable ISOs ---" --class separator {
            true
        }
        for iso in "$isopath"/*.iso "$isopath"/*.ISO "$isopath"/*.img "$isopath"/*.IMG; do
            if [ -f "$iso" ]; then
                gettext "${iso##*/}" --set=isoname
                menuentry "Boot ${isoname}" --class iso {
                    set isofile=$iso
                    loopback loop $isofile
                    if [ -f (loop)/boot/grub/loopback.cfg ]; then
                        configfile (loop)/boot/grub/loopback.cfg
                    else
                        chainloader (loop)
                    fi
                }
            fi
        done
    fi
fi

# Utility entries
menuentry "--- System ---" --class separator {
    true
}

menuentry "Boot from next device" --class fwboot {
    fwboot
}

menuentry "Reboot" --class reboot {
    reboot
}

menuentry "Shutdown" --class halt {
    halt
}
