
# ++++++++++++++++++++++++++++++++++++++++++++++
# Kouprey Boot - Custom GRUB configuration
# ++++++++++++++++++++++++++++++++++++++++++++++

# Fix GRUB prefix — scan partitions for GRUB normal.mod on the ESP
if [ -f (hd0,gpt2)/grub/$grub_cpu-$grub_platform/normal.mod ]; then
    set prefix=(hd0,gpt2)/grub
elif [ -f (hd0,gpt1)/grub/$grub_cpu-$grub_platform/normal.mod ]; then
    set prefix=(hd0,gpt1)/grub
elif [ -f (hd0,gpt3)/grub/$grub_cpu-$grub_platform/normal.mod ]; then
    set prefix=(hd0,gpt3)/grub
elif [ -f (hd1,gpt2)/grub/$grub_cpu-$grub_platform/normal.mod ]; then
    set prefix=(hd1,gpt2)/grub
elif [ -f (hd1,gpt1)/grub/$grub_cpu-$grub_platform/normal.mod ]; then
    set prefix=(hd1,gpt1)/grub
elif [ -f (hd1,gpt3)/grub/$grub_cpu-$grub_platform/normal.mod ]; then
    set prefix=(hd1,gpt3)/grub
elif [ -f (hd2,gpt2)/grub/$grub_cpu-$grub_platform/normal.mod ]; then
    set prefix=(hd2,gpt2)/grub
elif [ -f (hd2,gpt1)/grub/$grub_cpu-$grub_platform/normal.mod ]; then
    set prefix=(hd2,gpt1)/grub
elif [ -f (hd2,gpt3)/grub/$grub_cpu-$grub_platform/normal.mod ]; then
    set prefix=(hd2,gpt3)/grub
elif [ -f (hd3,gpt2)/grub/$grub_cpu-$grub_platform/normal.mod ]; then
    set prefix=(hd3,gpt2)/grub
elif [ -f (hd3,gpt1)/grub/$grub_cpu-$grub_platform/normal.mod ]; then
    set prefix=(hd3,gpt1)/grub
elif [ -f (hd3,gpt3)/grub/$grub_cpu-$grub_platform/normal.mod ]; then
    set prefix=(hd3,gpt3)/grub
fi

# Video mode
insmod efi_gop
insmod efi_uga
insmod video_bochs
insmod video_cirrus
insmod all_video
insmod gfxterm
insmod gfxmenu
insmod jpeg
insmod png

# Filesystem modules
insmod part_gpt
insmod part_msdos
insmod exfat
insmod ntfs
insmod fat
insmod ext2
insmod iso9660
insmod udf
insmod loopback
insmod chain
insmod search
insmod search_fs_file
insmod search_label
insmod regexp
insmod cat
insmod ls
insmod echo
insmod gzio
insmod xzio
insmod efifwsetup

set gfxmode=auto
set gfxpayload=keep
terminal_output gfxterm

# Font
if [ -f $prefix/fonts/unicode.pf2 ]; then
    loadfont $prefix/fonts/unicode.pf2
elif [ -f $prefix/fonts/ascii.pf2 ]; then
    loadfont $prefix/fonts/ascii.pf2
fi

# Find DATA partition — scan ALL devices for themes/.marker
search --no-floppy --set=data_root --file /themes/.marker
if [ -n "$data_root" ]; then
    # Theme from DATA
    if [ -f ($data_root)/themes/theme.txt ]; then
        set theme=($data_root)/themes/theme.txt
    elif [ -f ($data_root)/themes/Vimix/theme.txt ]; then
        set theme=($data_root)/themes/Vimix/theme.txt
    fi
else
    # Fallback: try ESP
    if [ -f $prefix/themes/theme.txt ]; then
        set theme=$prefix/themes/theme.txt
    fi
fi

# Default timeout
if [ -z "$timeout" ]; then
    set timeout=30
fi

# Color
set menu_color_normal=cyan/blue
set menu_color_highlight=white/blue


# Main menu
menuentry "Kouprey Boot - USB Multi-Boot" --class kouprey {
    echo "Kouprey Boot loaded successfully"
}


# boot_iso function — $1 = GRUB device, $2 = ISO path (e.g. /ISOS/file.iso)
function boot_iso {
    set iso_dev=$1
    set iso_path=$2
    loopback -d loop
    loopback loop "${iso_dev}${iso_path}"

    # 1. loopback.cfg — most reliable, let the distro handle itself
    if [ -f (loop)/boot/grub/loopback.cfg ]; then
        echo "Detected: loopback.cfg — sourcing distro boot config"
        configfile (loop)/boot/grub/loopback.cfg
        return
    fi

    # 2. Arch Linux / CachyOS / Manjaro
    if [ -f (loop)/arch/boot/x86_64/vmlinuz-linux ]; then
        echo "Detected: Arch Linux (CachyOS / EndeavourOS / Manjaro)"
        linux (loop)/arch/boot/x86_64/vmlinuz-linux archisobasedir=arch "img_loop=$iso_path"
        if [ -f (loop)/arch/boot/x86_64/archiso.img ]; then
            initrd (loop)/arch/boot/x86_64/archiso.img
        elif [ -f (loop)/arch/boot/x86_64/initramfs-linux.img ]; then
            initrd (loop)/arch/boot/x86_64/initramfs-linux.img
        elif [ -f (loop)/arch/boot/x86_64/initramfs-linux-fallback.img ]; then
            initrd (loop)/arch/boot/x86_64/initramfs-linux-fallback.img
        fi
        boot
    fi

    # 3. Ubuntu / Debian live (casper)
    if [ -f (loop)/casper/vmlinuz ]; then
        echo "Detected: Ubuntu / Debian (casper)"
        linux (loop)/casper/vmlinuz boot=casper "iso-scan/filename=$iso_path" quiet splash
        if [ -f (loop)/casper/initrd.lz ]; then
            initrd (loop)/casper/initrd.lz
        elif [ -f (loop)/casper/initrd.img ]; then
            initrd (loop)/casper/initrd.img
        elif [ -f (loop)/casper/initrd ]; then
            initrd (loop)/casper/initrd
        fi
        boot
    fi

    # 4. Debian live / Redo Rescue (live/)
    if [ -f (loop)/live/vmlinuz ]; then
        echo "Detected: Debian Live / Redo Rescue"
        linux (loop)/live/vmlinuz boot=live quiet
        if [ -f (loop)/live/initrd.img ]; then
            initrd (loop)/live/initrd.img
        elif [ -f (loop)/live/initrd ]; then
            initrd (loop)/live/initrd
        fi
        boot
    fi

    # 5. Debian installer
    if [ -f (loop)/install.amd/vmlinuz ]; then
        echo "Detected: Debian Installer"
        linux (loop)/install.amd/vmlinuz
        if [ -f (loop)/install.amd/initrd.gz ]; then
            initrd (loop)/install.amd/initrd.gz
        fi
        boot
    fi

    # 6. Fedora / RHEL / CentOS / AlmaLinux / Rocky
    if [ -f (loop)/images/pxeboot/vmlinuz ]; then
        echo "Detected: Fedora / RHEL / CentOS"
        linux (loop)/images/pxeboot/vmlinuz rd.live.image quiet
        if [ -f (loop)/images/pxeboot/initrd.img ]; then
            initrd (loop)/images/pxeboot/initrd.img
        fi
        boot
    fi

    # 7. openSUSE
    if [ -f (loop)/boot/x86_64/loader/linux ]; then
        echo "Detected: openSUSE"
        linux (loop)/boot/x86_64/loader/linux splash quiet
        if [ -f (loop)/boot/x86_64/loader/initrd ]; then
            initrd (loop)/boot/x86_64/loader/initrd
        fi
        boot
    fi

    # 8. SystemRescue
    if [ -f (loop)/sysresccd/boot/x86_64/vmlinuz ]; then
        echo "Detected: SystemRescue"
        linux (loop)/sysresccd/boot/x86_64/vmlinuz archisobasedir=sysresccd "img_loop=$iso_path"
        if [ -f (loop)/sysresccd/boot/x86_64/sysresccd.img ]; then
            initrd (loop)/sysresccd/boot/x86_64/sysresccd.img
        elif [ -f (loop)/sysresccd/boot/x86_64/initramfs.img ]; then
            initrd (loop)/sysresccd/boot/x86_64/initramfs.img
        fi
        boot
    fi

    # 9. Generic Linux (boot/vmlinuz)
    if [ -f (loop)/boot/vmlinuz ]; then
        echo "Detected: Generic Linux"
        linux (loop)/boot/vmlinuz quiet
        if [ -f (loop)/boot/initrd.img ]; then
            initrd (loop)/boot/initrd.img
        elif [ -f (loop)/boot/initrd ]; then
            initrd (loop)/boot/initrd
        fi
        boot
    fi

    # 10. Windows — direct chainload
    if [ -f (loop)/efi/microsoft/boot/bootmgfw.efi ]; then
        echo "Detected: Windows UEFI"
        chainloader (loop)/efi/microsoft/boot/bootmgfw.efi
        boot
    fi
    if [ -f (loop)/bootmgr.efi ]; then
        echo "Detected: Windows (bootmgr.efi)"
        chainloader (loop)/bootmgr.efi
        boot
    fi

    # 11. Generic EFI boot
    if [ -f (loop)/efi/boot/bootx64.efi ]; then
        echo "Detected: Generic EFI (bootx64)"
        chainloader (loop)/efi/boot/bootx64.efi
        boot
    fi
    if [ -f (loop)/efi/boot/bootia32.efi ]; then
        echo "Detected: Generic EFI (bootia32)"
        chainloader (loop)/efi/boot/bootia32.efi
        boot
    fi

    loopback -d loop
    echo "Cannot boot ISO: ${iso_dev}${iso_path}"
}

# Auto-generated ISO entries from ISOS/.iso_menu.cfg
if [ -n "$data_root" ]; then
    if [ -f ($data_root)/ISOS/.iso_menu.cfg ]; then
        source ($data_root)/ISOS/.iso_menu.cfg
    fi
fi

# Utility entries
menuentry "--- System ---" --class separator {
    true
}

menuentry "Boot from next device" --class fwboot {
    exit
}

menuentry "Reboot" --class reboot {
    reboot
}

menuentry "Shutdown" --class halt {
    halt
}
